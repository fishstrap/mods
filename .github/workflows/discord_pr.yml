name: Create PR from Discord

on:
  workflow_dispatch:
    inputs:
      target_dir:
        required: true
        type: string
      post_name:
        required: true
        type: string
      type_enum:
        required: true
        type: string
      author_name:
        required: true
        type: string
      author_pfp_url:
        required: true
        type: string
      version:
        required: true
        type: string
      description:
        required: true
        type: string
      preview_url:
        required: true
        type: string
      zip_url:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build directory and download assets
        run: |
          TARGET_PATH="${{ inputs.target_dir }}/${{ inputs.post_name }}"
          mkdir -p "$TARGET_PATH"

          jq -n \
            --arg title "${{ inputs.post_name }}" \
            --arg version "${{ inputs.version }}" \
            --argjson type ${{ inputs.type_enum }} \
            --arg author "${{ inputs.author_name }}" \
            --arg description "${{ inputs.description }}" \
            '{title: $title, version: $version, type: $type, author: $author, description: $description}' \
            > "$TARGET_PATH/manifest.json"

          curl -sL "${{ inputs.author_pfp_url }}" -o "$TARGET_PATH/author.webp"
          curl -sL "${{ inputs.preview_url }}" -o "$TARGET_PATH/preview.webp"

          ZIP_FILENAME=$(printf '%s' "${{ inputs.post_name }}" | jq -Rr '@uri')
          curl -sL "${{ inputs.zip_url }}" -o "$TARGET_PATH/${ZIP_FILENAME}.zip"

      - uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Add ${{ inputs.post_name }} to ${{ inputs.target_dir }}"
          branch: "discord-${{ inputs.target_dir }}-${{ github.run_id }}"
          title: "[${{ inputs.target_dir }}] ${{ inputs.post_name }}"
          body: "Adds ${{ inputs.post_name }} (version ${{ inputs.version }}) by ${{ inputs.author_name }} to ${{ inputs.target_dir }}."
