name: Create PR from Discord

on:
    workflow_dispatch:
        inputs:
            post_name:
                required: true
                type: string
            target_dir:
                required: true
                type: string
            type_enum:
                required: true
                type: string
            author_name:
                required: true
                type: string
            description:
                required: true
                type: string
            author_pfp_url:
                required: true
                type: string
            preview_url:
                required: false
                type: string
            zip_url:
                required: false
                type: string

jobs:
    create-pr:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Build Directory and Download Assets
              run: |
                  TARGET_PATH="${{ inputs.target_dir }}/${{ inputs.post_name }}"
                  mkdir -p "$TARGET_PATH"

                  jq -n \
                    --arg title "${{ inputs.post_name }}" \
                    --arg version "1.0.0" \
                    --argjson type "${{ inputs.type_enum }}" \
                    --arg author "${{ inputs.author_name }}" \
                    --arg desc "${{ inputs.description }}" \
                    '{title: $title, version: $version, type: $type, author: $author, description: $desc}' > "$TARGET_PATH/manifest.json"

                  if [ -n "${{ inputs.author_pfp_url }}" ]; then
                    curl -sL "${{ inputs.author_pfp_url }}" -o "$TARGET_PATH/author.webp"
                  fi

                  if [ -n "${{ inputs.preview_url }}" ]; then
                    curl -sL "${{ inputs.preview_url }}" -o "$TARGET_PATH/preview.webp"
                  fi

                  if [ -n "${{ inputs.zip_url }}" ]; then
                    curl -sL "${{ inputs.zip_url }}" -o "$TARGET_PATH/${{ inputs.post_name }}.zip"
                  fi

            - uses: peter-evans/create-pull-request@v6
              with:
                  token: ${{ secrets.PAT_TOKEN }}
                  commit-message: "Add ${{ inputs.post_name }} to ${{ inputs.target_dir }}"
                  title: "[${{ inputs.target_dir }}] ${{ inputs.post_name }}"
                  branch: "discord-${{ inputs.target_dir }}-${{ github.run_id }}"
                  body: "Automated PR created from Discord forum post."
